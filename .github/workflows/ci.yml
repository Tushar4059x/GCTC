name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gctc
          POSTGRES_PASSWORD: gctc
          POSTGRES_DB: gctc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gctc"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://gctc:gctc@localhost:5432/gctc_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate -w @gctc/api
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile .
      - name: Build web image
        run: docker build -f apps/web/Dockerfile .
